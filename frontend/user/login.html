<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Personal Expense Tracker</title>
    <meta name="description" content="Login to access your personal or administrative financial tracking overview securely.">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Personal Expense Tracker</h2>
            <p>Login to access your financial overview</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 8px;">Login</button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Register here</a></p>
            <p class="text-muted-sm" style="margin-top: 10px;">
                Admin Credentials: admin@example.com / Admin@123
            </p>
        </div>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
