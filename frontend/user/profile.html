<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Personal Expense Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>ExpenseTracker</h2>
            </div>
            
            <div class="sidebar-user">
                <div id="sidebarAvatar"></div>
                <div class="user-info">
                    <span class="user-name" id="sidebarUserName">Loading...</span>
                    <span class="user-role" id="sidebarUserRole">User</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="transactions.html">Transactions</a>
                <a href="add-transaction.html">Add Transaction</a>
                <a href="reports.html">Reports</a>
                <a href="profile.html" class="active">Profile</a>
                <a href="#" id="logoutBtn" class="logout-link" style="margin-top: auto;">Logout</a>
            </nav>
        </aside>
        
        <div class="main-layout">
            <header class="app-header">
                <h1>My Profile</h1>
            </header>
            
            <main class="content-area">
                <div class="profile-layout">
                    <!-- Left side: avatar edit -->
                    <div class="panel profile-card">
                        <div class="profile-pic-container">
                            <img id="profilePicImage" src="" alt="Profile Image" class="user-avatar" style="display: none;">
                            <div id="profilePicPlaceholder" class="user-avatar-placeholder">U</div>
                            
                            <label class="profile-pic-upload" for="profilePicInput">
                                <svg viewBox="0 0 24 24">
                                    <path d="M4 4h3l2-2h6l2 2h3a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2zm8 3a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
                                </svg>
                                <input type="file" id="profilePicInput" accept="image/*">
                            </label>
                        </div>
                        <h2 id="profileNameHeading" style="margin-top: 10px; font-size: 18px;">Personal Account</h2>
                        <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px;">Upload a profile picture to customize your layout.</p>
                    </div>

                    <!-- Right side: profile fields & password reset -->
                    <div class="panel">
                        <div class="panel-header">
                            <h2>Profile Settings</h2>
                        </div>
                        
                        <form id="profileForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="profileName">Full Name</label>
                                    <input type="text" id="profileName" name="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="profileEmail">Email Address</label>
                                    <input type="email" id="profileEmail" name="email" required>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="profileGender">Gender</label>
                                    <select id="profileGender" name="gender">
                                        <option value="">-- Select Gender --</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="profileDob">Date of Birth</label>
                                    <input type="date" id="profileDob" name="dob">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="profileCountry">Country</label>
                                <select id="profileCountry" name="country">
                                    <option value="">-- Select Country --</option>
                                    <option value="pk">Pakistan</option>
                                    <option value="af">Afghanistan</option>
                                    <option value="ir">Iran</option>
                                    <option value="in">India</option>
                                    <option value="ch">China</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>

                            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 16px 0;">
                            
                            <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary);">Change Password</h3>
                            
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" id="currentPassword" placeholder="Enter current password">
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="newPassword">New Password</label>
                                    <input type="password" id="newPassword" placeholder="Minimum 6 characters">
                                </div>
                                <div class="form-group">
                                    <label for="confirmNewPassword">Confirm New Password</label>
                                    <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary" style="margin-top: 12px; align-self: flex-start;">Save Changes</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
